name: Build Checklist APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Prepare web bundle
        run: npm run prepare:apk

      - name: Add Android project
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Generate Android launcher icon and splash
        run: npx capacitor-assets generate --android --assetPath assets

      - name: Build debug APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OFICIN-IA-CHECKLIST-V15-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
