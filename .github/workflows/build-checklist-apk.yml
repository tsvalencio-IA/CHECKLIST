name: Build Checklist APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Confirm Node version
        run: |
          node -v
          npm -v

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare web bundle
        run: npm run prepare:apk

      - name: Add Android project
        run: |
          node -v
          npx cap --version
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Apply Android launcher icon
        run: npm run android:icons

      - name: Build debug APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OFICIN-IA-CHECKLIST-V15-4-GITHUB-PAGES-APK-CORRIGIDO
          path: android/app/build/outputs/apk/debug/app-debug.apk
